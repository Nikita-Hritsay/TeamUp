spring:
  application:
    name: "message"
  cloud:
    function:
      definition: email|sms
    stream:
      bindings:
        emailsms-in-0:
          destination: send-userCreation
          group: ${spring.application.name}
        emailsms-out-0:
          destination: communication-sent
          group: ${spring.application.name}
      kafka:
        binder:
          brokers:
            - localhost:9092
        bindings:
          emailsms-in-0:
            consumer:
              enable-dlq: true
              dlq-name: send-userCreation.DLQ

server:
  port: 9010
